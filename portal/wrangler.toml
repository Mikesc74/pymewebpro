name = "pymewebpro-portal"
main = "src/index.js"
compatibility_date = "2026-04-01"
account_id = "c98561adefb602704d4e7a6a1b7e7597"

# Custom domain route (already configured on the live Worker · keep here for parity)
# *.sites.pymewebpro.com is the tenant namespace · every client site auto-publishes
# to <slug>.sites.pymewebpro.com with no per-client DNS work. Requires a wildcard
# DNS record (CNAME *.sites pymewebpro-portal.workers.dev) configured one-time on the zone.
routes = [
  # portal.pymewebpro.com retired 2026-05-13. Studio admin lives under the
  # master portal at colguides.com/portal/pymewebpro/* (Access-gated).
  { pattern = "*.sites.pymewebpro.com/*", zone_name = "pymewebpro.com" },
  { pattern = "mockups.pymewebpro.com/*", zone_name = "pymewebpro.com" },
  # santi.pymewebpro.com - Santi's bilingual sales site. See src/santi.js.
  # custom_domain = true → wrangler auto-creates the DNS record on first deploy.
  { pattern = "santi.pymewebpro.com", zone_name = "pymewebpro.com", custom_domain = true },
  # inviersol.com routes REMOVED 2026-05-19 · this site now lives on its own
  # Cloudflare Pages project (`inviersol`, repo ~/code/Inviersol/). If these
  # routes are restored, pymewebpro-portal will hijack inviersol.com again and
  # serve empty 200s because there is no per-host logic for it here. See
  # ~/code/Inviersol/CLAUDE.md Recent changes 2026-05-19.
  # Master portal mount under colguides.com (Mike + Santi only, Access-gated).
  # The fetch handler detects this host+prefix, strips /portal/pymewebpro from
  # the path before routing, and rewrites outbound HTML/redirects to keep the
  # prefix in the URL bar. See src/index.js fetch() and rewriteForPwpSubpath().
  { pattern = "colguides.com/portal/pymewebpro/*", zone_name = "colguides.com" },
  { pattern = "www.colguides.com/portal/pymewebpro/*", zone_name = "colguides.com" },
]

# --- Bindings (discovered from the live deployment 2026-04-30) ------------

[[d1_databases]]
binding = "DB"
database_name = "pymewebpro-portal"
database_id = "93fc7e21-713c-4479-bb55-69ae05c275dc"

[[kv_namespaces]]
binding = "TOKENS"
id = "47573834bfad418aa10b8f851a250a03"

[[r2_buckets]]
binding = "ASSETS"
bucket_name = "pymewebpro-client-assets"

# --- Cron triggers --------------------------------------------------------
# 14:00 UTC == 09:00 America/Bogota (UTC-5, no DST). Drives the nightly
# cadence sweep in src/index.js scheduled() · creates D+1/D+3/D+7/D+14
# follow-up tasks in `activities` for any open-funnel lead whose last touch
# landed on one of those bucket boundaries.
[triggers]
crons = ["0 14 * * *"]

# --- Plain-text vars ------------------------------------------------------
# These are visible in the Worker; don't put secrets here.
[vars]
APP_URL = "https://colguides.com/portal/pymewebpro"
FROM_EMAIL = "PymeWebPro <noreply@pymewebpro.com>"
ADMIN_EMAIL = "hello@pymewebpro.com"
WHATSAPP_NUMBER = "+573014047722"

# Chief of Staff agent · cross-worker dispatch
# Catalina exposes /api/agent on catalina.medellin.guide. The CoS posts to this
# URL with a shared-secret header (COS_SHARED_SECRET) to call WhatsApp send,
# Google Calendar booking, web search, fetch_url, weather, place lookup, live
# Catalina DB reads, and Cloudflare traffic analytics actions.
CATALINA_AGENT_URL = "https://catalina.medellin.guide/api/agent"
COS_EMAIL_FROM     = "Chief of Staff <chief@medellin.guide>"
COS_EMAIL_REPLY_TO = "mike@mikec.pro"

# Shared Tasks portal at tasks.colguides.com (the kanban for Mike + Santi).
# The CoS uses Cloudflare Access service token credentials (same one that
# powers `node scripts/add-task.mjs` in ~/code/tasks-portal/) to programmatically
# add/list/update/delete tasks. The Client ID is visible; the Client Secret is
# stored as a worker secret (TASKS_ACCESS_CLIENT_SECRET).
TASKS_PORTAL_URL       = "https://tasks.colguides.com"
TASKS_ACCESS_CLIENT_ID = "ebf6ce7ef81ee9f7cb28774011630ce4.access"

# --- Secrets (NOT stored here · set via wrangler) -------------------------
# Run these once after `wrangler login`:
#
#   wrangler secret put ADMIN_TOKEN          --name pymewebpro-portal
#   wrangler secret put RESEND_API_KEY       --name pymewebpro-portal
#   wrangler secret put WOMPI_PUBLIC_KEY     --name pymewebpro-portal
#   wrangler secret put WOMPI_INTEGRITY      --name pymewebpro-portal
#   wrangler secret put WOMPI_EVENTS         --name pymewebpro-portal
#
# Values are already set on the live Worker · view/copy them from
# Cloudflare dashboard → Workers & Pages → pymewebpro-portal → Settings → Variables.

# --- Build hardening (must stay at end of file so subsequent top-level keys
# don't get captured as `build.X` or `rules.X` by TOML's section semantics). --

# Bundle *.html files as Text imports so the inline-SPA HTML can live in its
# own file (src/frontend.html) instead of as a JS template literal. Eliminates
# the class of bug where `\n` inside the literal silently became a real
# newline at worker boot. See CLAUDE.md 2026-05-19 (later x10/x11).
[[rules]]
type = "Text"
globs = ["**/*.html"]
fallthrough = true

# Force `npm run check` on EVERY `wrangler deploy`. npm's `predeploy` hook
# only fires on `npm run deploy`; direct `wrangler deploy` would otherwise
# bypass it. See ~/code/PLATFORM.md (Template-literal hardening).
[build]
command = "npm run check"
